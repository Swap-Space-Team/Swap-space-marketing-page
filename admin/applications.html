<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applications | SwapSpace Admin</title>
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <div>
        <a href="/admin/applications"><img src="/assets/Swapspace wordmark.svg" height="28" alt="SwapSpace"></a>
      </div>
      <div class="profile-menu-wrap">
        <button class="profile-icon-btn" onclick="toggleProfileMenu(event)" aria-label="Account menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
        <div class="profile-dropdown" id="profileDropdown">
          <span class="profile-dropdown-email" id="userEmail"></span>
          <div class="profile-dropdown-divider"></div>
          <button class="profile-dropdown-item" onclick="showChangePassword(); closeProfileMenu()">Change password</button>
          <button class="profile-dropdown-item profile-dropdown-item--danger" onclick="signOut()">Sign out</button>
        </div>
      </div>
    </div>

    <!-- Tab switcher -->
    <div style="display:flex; gap:4px; margin-bottom:28px; border-bottom:1px solid #E5E7EB; padding-bottom:0;">
      <button id="tabApplications" onclick="switchTab('applications')" style="padding:8px 18px 10px; font-size:14px; font-weight:500; background:none; border:none; border-bottom:2px solid #079455; color:#079455; cursor:pointer; margin-bottom:-1px; font-family:inherit;">Applications</button>
      <button id="tabLeads" onclick="switchTab('leads')" style="padding:8px 18px 10px; font-size:14px; font-weight:500; background:none; border:none; border-bottom:2px solid transparent; color:#6B7280; cursor:pointer; margin-bottom:-1px; font-family:inherit;">Calculator Leads</button>
    </div>

    <!-- ── Applications tab ── -->
    <div id="panelApplications">
      <!-- Stats -->
      <div class="stats-bar" id="statsBar">
        <div class="stat-card">
          <div class="stat-label">Total</div>
          <div class="stat-value" id="statTotal">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Photos Requested</div>
          <div class="stat-value" id="statRequested">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Photos Received</div>
          <div class="stat-value" id="statReceived">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Approved</div>
          <div class="stat-value" id="statApproved">—</div>
        </div>
      </div>

      <!-- Filters -->
      <div class="filters">
        <div class="filter-btns">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="Photos Requested">Photos Requested</button>
          <button class="filter-btn" data-filter="Photos Received">Photos Received</button>
          <button class="filter-btn" data-filter="Approved">Approved</button>
        </div>
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="searchInput" placeholder="Search by name or email…" oninput="renderTable()">
        </div>
      </div>

      <!-- Table -->
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th style="width:40px; color:#9CA3AF;">#</th>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Country</th>
              <th>City</th>
              <th>Status</th>
              <th>Photos</th>
              <th>Ready to List</th>
              <th>
                <button id="sortDateBtn" onclick="toggleSort()" style="background:none;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font:inherit;font-size:11px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:0.05em;padding:0;">
                  Submission date
                  <svg id="sortIcon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>
                  </svg>
                </button>
              </th>
              <th></th>
            </tr>
          </thead>
          <tbody id="applicationsBody">
            <tr>
              <td colspan="10" class="loading">Loading applications...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ── Calculator Leads tab ── -->
    <div id="panelLeads" style="display:none;">
      <!-- Stats -->
      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-label">Total Leads</div>
          <div class="stat-value" id="leadStatTotal">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Budget</div>
          <div class="stat-value" id="leadStatBudget">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Mid-range</div>
          <div class="stat-value" id="leadStatMid">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Comfortable</div>
          <div class="stat-value" id="leadStatComfort">—</div>
        </div>
      </div>

      <!-- Search -->
      <div class="filters" style="justify-content:flex-end;">
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="leadsSearchInput" placeholder="Search by email or city…" oninput="renderLeadsTable()">
        </div>
      </div>

      <!-- Table -->
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th style="width:40px; color:#9CA3AF;">#</th>
              <th>Email</th>
              <th>City</th>
              <th>Style</th>
              <th>Nights</th>
              <th>Travellers</th>
              <th>Currency</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="leadsBody">
            <tr><td colspan="9" class="loading">Loading leads…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/admin/admin.js"></script>
  <script>
    let allApplications = [];
    let photoMap = {}; // applicationId -> { firstUrl, count }
    let currentFilter = 'all';
    let sortAsc = true; // oldest first by default

    (async () => {
      const session = await requireAuth();
      if (!session) return;

      document.getElementById('userEmail').textContent = session.user.email;
      await loadApplications();
    })();

    // Filter buttons
    document.querySelectorAll('.filter-btns .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btns .filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderTable();
      });
    });

    async function loadApplications() {
      const sb = await getSupabase();

      const [{ data, error }, { data: photos }] = await Promise.all([
        sb.from('applications').select('*').order('created_at', { ascending: false }),
        sb.from('application_photos').select('application_id, storage_path').order('uploaded_at', { ascending: true }),
      ]);

      if (error) {
        console.error('Error loading applications:', error);
        document.getElementById('applicationsBody').innerHTML =
          '<tr><td colspan="10" class="empty-state">Failed to load applications.</td></tr>';
        return;
      }

      allApplications = data || [];

      // Build a map: appId -> [storagePaths]
      const grouped = {};
      for (const p of (photos || [])) {
        if (!grouped[p.application_id]) grouped[p.application_id] = [];
        grouped[p.application_id].push(p.storage_path);
      }

      // Collect the first 2 preview paths per application
      photoMap = {};
      const appIdsWithPhotos = Object.keys(grouped);
      const previewMeta = []; // { appId, path }
      for (const appId of appIdsWithPhotos) {
        grouped[appId].slice(0, 2).forEach(path => previewMeta.push({ appId, path }));
      }

      // Fetch all preview signed URLs in one batch call
      if (previewMeta.length > 0) {
        const { data: signedData } = await sb.storage
          .from('application-photos')
          .createSignedUrls(previewMeta.map(m => m.path), 3600);

        (signedData || []).forEach((item, i) => {
          const { appId } = previewMeta[i];
          if (!photoMap[appId]) photoMap[appId] = { urls: [], count: grouped[appId].length };
          if (item.signedUrl) photoMap[appId].urls.push(item.signedUrl);
        });

        // Ensure all apps with photos have an entry even if signing failed
        for (const appId of appIdsWithPhotos) {
          if (!photoMap[appId]) photoMap[appId] = { urls: [], count: grouped[appId].length };
        }
      }

      updateStats();
      renderTable();
    }

    function updateStats() {
      document.getElementById('statTotal').textContent = allApplications.length;
      document.getElementById('statRequested').textContent =
        allApplications.filter(a => a.application_status === 'Photos Requested').length;
      document.getElementById('statReceived').textContent =
        allApplications.filter(a => a.application_status === 'Photos Received').length;
      document.getElementById('statApproved').textContent =
        allApplications.filter(a => a.application_status === 'Approved').length;
    }

    function renderPhotos(appId) {
      const p = photoMap[appId];
      if (!p || !p.urls.length) return '<span style="color:#9CA3AF; font-size:13px;">—</span>';
      const remaining = p.count - p.urls.length;
      return `
        <div class="thumb-cell">
          ${p.urls.map(url => `<img class="thumb" src="${url}" alt="Photo">`).join('')}
          ${remaining > 0 ? `<span class="thumb-count">+${remaining}</span>` : ''}
        </div>`;
    }

    function toggleSort() {
      sortAsc = !sortAsc;
      const icon = document.getElementById('sortIcon');
      if (icon) {
        icon.style.transform = sortAsc ? 'rotate(0deg)' : 'rotate(180deg)';
        icon.style.transition = 'transform 0.2s ease';
      }
      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById('applicationsBody');
      const query = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();

      const filtered = allApplications
        .filter(a => {
          const matchesFilter = currentFilter === 'all' || a.application_status === currentFilter;
          const matchesSearch = !query ||
            (a.name || '').toLowerCase().includes(query) ||
            (a.email || '').toLowerCase().includes(query);
          return matchesFilter && matchesSearch;
        })
        .sort((a, b) => {
          const da = new Date(a.submission_date || a.created_at || 0);
          const db = new Date(b.submission_date || b.created_at || 0);
          return sortAsc ? da - db : db - da;
        });

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" class="empty-state">No applications found.</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map((app, i) => `
        <tr onclick="window.location.href='/admin/application?id=${app.id}'">
          <td style="color:#9CA3AF; font-size:13px; font-weight:400;">${i + 1}</td>
          <td style="font-weight: 500;">${app.name || '—'}</td>
          <td>${app.email || '—'}</td>
          <td>${app.phone || '—'}</td>
          <td>${app.country || '—'}</td>
          <td>${app.city || '—'}</td>
          <td>${statusBadge(app.application_status)}</td>
          <td>${renderPhotos(app.id)}</td>
          <td>${app.listing_ready === 'ready' ? 'Yes' : app.listing_ready === 'not-ready' ? 'Not yet' : '—'}</td>
          <td>${formatDate(app.submission_date || app.created_at)}</td>
          <td onclick="event.stopPropagation()">
            <button class="row-delete-btn" onclick="deleteApplication('${app.id}', event)" title="Delete record">
              <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6l-1 14H6L5 6"></path>
                <path d="M10 11v6M14 11v6"></path>
                <path d="M9 6V4h6v2"></path>
              </svg>
            </button>
          </td>
        </tr>
      `).join('');
    }
    // ── Tab switching ──────────────────────────────────────────────────────────
    function switchTab(tab) {
      const isLeads = tab === 'leads';
      document.getElementById('panelApplications').style.display = isLeads ? 'none' : 'block';
      document.getElementById('panelLeads').style.display = isLeads ? 'block' : 'none';

      const tabApps  = document.getElementById('tabApplications');
      const tabLeads = document.getElementById('tabLeads');
      tabApps.style.borderBottomColor  = isLeads ? 'transparent' : '#079455';
      tabApps.style.color              = isLeads ? '#6B7280' : '#079455';
      tabLeads.style.borderBottomColor = isLeads ? '#079455' : 'transparent';
      tabLeads.style.color             = isLeads ? '#079455' : '#6B7280';

      if (isLeads && allLeads === null) loadLeads();
    }

    // ── Calculator Leads ───────────────────────────────────────────────────────
    let allLeads = null;

    async function loadLeads() {
      const response = await adminFetch('/api/admin?action=calculator-leads', { method: 'GET' });
      if (!response) return;
      const data = await response.json();
      allLeads = Array.isArray(data) ? data : [];
      updateLeadsStats();
      renderLeadsTable();
    }

    function updateLeadsStats() {
      document.getElementById('leadStatTotal').textContent   = allLeads.length;
      document.getElementById('leadStatBudget').textContent  = allLeads.filter(l => l.style === 'budget').length;
      document.getElementById('leadStatMid').textContent     = allLeads.filter(l => l.style === 'mid-range').length;
      document.getElementById('leadStatComfort').textContent = allLeads.filter(l => l.style === 'comfortable').length;
    }

    function renderLeadsTable() {
      const tbody = document.getElementById('leadsBody');
      const query = (document.getElementById('leadsSearchInput')?.value || '').toLowerCase().trim();
      const filtered = (allLeads || []).filter(l =>
        !query ||
        (l.email || '').toLowerCase().includes(query) ||
        (l.city  || '').toLowerCase().includes(query)
      );

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty-state">No leads found.</td></tr>';
        return;
      }

      const styleLabel = { budget: 'Budget', 'mid-range': 'Mid-range', comfortable: 'Comfortable' };
      tbody.innerHTML = filtered.map((l, i) => `
        <tr style="cursor:default;">
          <td style="color:#9CA3AF; font-size:13px; font-weight:400;">${i + 1}</td>
          <td style="font-weight:500;">${l.email || '—'}</td>
          <td>${l.city || '—'}</td>
          <td>${styleLabel[l.style] || l.style || '—'}</td>
          <td>${l.nights || '—'}</td>
          <td>${l.travellers || '—'}</td>
          <td>${l.currency || '—'}</td>
          <td>${formatDate(l.created_at)}</td>
        </tr>
      `).join('');
    }

    async function deleteApplication(appId, e) {
      e.stopPropagation();
      const btn = e.currentTarget;
      if (!await showConfirm({
        title: 'Delete Application',
        message: 'This will permanently delete the application and all associated photos. This cannot be undone.',
        confirmText: 'Delete',
        variant: 'danger',
      })) return;
      btn.disabled = true;

      const response = await adminFetch('/api/admin?action=delete-application', {
        method: 'POST',
        body: JSON.stringify({ applicationId: appId }),
      });

      if (!response) { btn.disabled = false; return; }
      const result = await response.json();

      if (result.success) {
        allApplications = allApplications.filter(a => a.id !== appId);
        delete photoMap[appId];
        updateStats();
        renderTable();
      } else {
        await showAlert({ title: 'Error', message: result.error || 'Failed to delete application.', variant: 'danger' });
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
